name: Docker CI/CD + Auto Deploy

on:
  push:
    branches: ["dev", "qa", "main"]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔹 Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔹 Set ENV (dev / qa / prod)
      - name: Set environment
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
            echo "HOST=${{ secrets.EC2_DEV_HOST }}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/qa" ]]; then
            echo "ENV=qa" >> $GITHUB_ENV
            echo "HOST=${{ secrets.EC2_QA_HOST }}" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
            echo "HOST=${{ secrets.EC2_PROD_HOST }}" >> $GITHUB_ENV
          fi

      # 🔹 Build FRONTEND
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${ENV} \
                       -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }} \
                       --build-arg ENVIRONMENT=${ENV} ./frontend

      # 🔹 Push FRONTEND
      - name: Push frontend images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${ENV}
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}

      # 🔹 Build BACKEND
      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${ENV} \
                       -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }} ./backend

      # 🔹 Push BACKEND
      - name: Push backend images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${ENV}
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}

      # 🔹 Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/myapp
            sudo docker-compose pull
            sudo docker-compose up -d
