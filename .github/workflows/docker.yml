name: Multi Env Auto Deploy

on:
  push:
    branches:
      - develop
      - qa
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    # 🔥 Map branch → environment
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || github.ref == 'refs/heads/qa' && 'qa' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 🔹 Set ENV + HOST
      - name: Set variables
        run: |
          if [[ "${GITHUB_REF##*/}" == "develop" ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
            echo "HOST=${{ secrets.EC2_DEV_HOST }}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF##*/}" == "qa" ]]; then
            echo "ENV=qa" >> $GITHUB_ENV
            echo "HOST=${{ secrets.EC2_QA_HOST }}" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
            echo "HOST=${{ secrets.EC2_PROD_HOST }}" >> $GITHUB_ENV
          fi

      # 🔹 Docker login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔹 Build & Push
      - name: Build & Push Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${ENV} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${ENV}

          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${ENV} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${ENV}

      # 🔹 Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/myapp
            docker-compose pull
            docker-compose up -d
