name: Docker CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔹 FRONTEND
      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }} ./frontend

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}

      # 🔹 BACKEND
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }} ./backend

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}
