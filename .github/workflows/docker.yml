name: Docker CI/CD

on:
  push:
    branches: ["dev", "qa", "main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔹 Set ENV
      - name: Set environment
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/qa" ]]; then
            echo "ENV=qa" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
          fi

      # 🔹 FRONTEND
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${ENV} \
                       -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }} \
                       --build-arg ENVIRONMENT=${ENV} ./frontend

      - name: Push frontend images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${ENV}
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}

      # 🔹 BACKEND
      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${ENV} \
                       -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }} ./backend

      - name: Push backend images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${ENV}
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}
